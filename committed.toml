style = "conventional"
subject_capitalized = false
subject_length = 80
merge_commit = true
allowed_types = [
  # User facing
  "feat",
  "fix",
  "perf",
  "refactor",
  "deprecate",
  "removed",
  "security",
  # Other
  "chore",
  "ci",
  "style",
  "test",
]
