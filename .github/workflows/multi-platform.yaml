# Tests that don't run on linux
name: multi-platform
on:
  workflow_call:
  workflow_dispatch:
permissions:
  contents: read
defaults:
  run:
    shell: bash
env:
  CI: "true"
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"
  NEXTEST_PROFILE: "ci"
jobs:
  test:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / test
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - uses: ./.github/actions/install-deps
        with:
          for-image: "${{ matrix.os }}"
      - uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: taiki-e/install-action@v2.82.5
        with:
          tool: cargo-nextest
      - name: cargo nextest run
        run: cargo nextest run --locked --all-features --workspace
