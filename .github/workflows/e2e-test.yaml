name: e2e-test
on:
  workflow_call:
  workflow_dispatch:
permissions:
  contents: read
defaults:
  run:
    shell: bash
env:
  CI: "true"
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"
  RUSTFLAGS: -D warnings
jobs:
  e2e-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Create Astarte Cluster
        id: astarte
        uses: astarte-platform/astarte-cluster-action@v2.0.0
        with:
          astarte_version: 1.3.0
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: ./.github/actions/install-deps
      - uses: actions-rust-lang/setup-rust-toolchain@v1.16.0
      - uses: mozilla-actions/sccache-action@v0.0.10
      - run: ./scripts/ci/e2e-test.sh
      - name: post
        if: ${{ failure() || cancelled() }}
        run: ./scripts/e2e-test/post.sh 'astarte'
