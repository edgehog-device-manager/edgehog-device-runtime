name: ci
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - release-*
permissions:
  contents: read
  id-token: write
env:
  CI: "true"
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings
  NEXTEST_PROFILE: "ci"
  MAIN_CRATE: "edgehog-device-runtime"
  EXPORT_FOR_CI: "true"
# Spend CI time only on latest ref
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash
jobs:
  dco:
    uses: ./.github/workflows/dco.yaml
    permissions:
      actions: read
      pull-requests: read
    with:
      pr: ${{ github.event.pull_request.number }}
  common:
    uses: ./.github/workflows/common.yaml
  e2e-test:
    uses: ./.github/workflows/e2e-test.yaml
  multi-platform:
    uses: ./.github/workflows/multi-platform.yaml
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - uses: ./.github/actions/install-deps
      - uses: astral-sh/setup-uv@v8.3.2
      - uses: go-task/setup-task@v2.1.0
      - uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: taiki-e/install-action@v2.83.0
        with:
          tool: |
            cargo-docs-rs
            cargo-hack
            cargo-llvm-cov
            cargo-minimal-versions
            cargo-nextest
            cargo-semver-checks
            rustfilt
            typos-cli
      - run: |
          task ci
      - name: Upload to codecov.io
        uses: codecov/codecov-action@v7.0.0
        with:
          use_oidc: true
          fail_ci_if_error: false
