version: 3

output: prefixed

set: [errexit, nounset, pipefail]

vars:
  MAIN_CRATE: edgehog-device-runtime
  LIBRARY: false
  MSRV: 1.88

env:
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings
  MAIN_CRATE: "{{ .MAIN_CRATE }}"

tasks:
  ci:
    env:
      CI: true
      CARGO_TERM_COLOR: always
      NEXTEST_PROFILE: "ci"
    deps:
      - reuse-lint
      # Done in ci with fetch-depth 0
      # - check-copyright
      - check-spelling
      - check-for-publish
      - cargo-fmt
      - cargo-clippy
      - cargo-docs-rs
      - cargo-features
      - cargo-test
      - cargo-semver-checks
    cmds:
      - task: cargo-msrv
      - task: cargo-minimal-versions

  reuse-lint:
    desc: "Check for files missing the copyright"
    cmd: uv run reuse lint

  check-copyright:
    desc: "Check that the copyright on changed files is up to date"
    cmds:
      - ./scripts/ci/add-copyright-to-modified.sh
      - git diff --exit-code --name-only

  check-spelling:
    desc: "Check for spelling errors"
    cmd: typos

  check-for-publish:
    desc: "Check that the crate can be published"
    cmd: ./scripts/ci/check-for-publish.sh

  cargo-fmt:
    desc: "Check cargo fmt"
    cmd: cargo fmt --check --all

  cargo-clippy:
    desc: "Check cargo clippy"
    cmd: cargo clippy --locked --all-targets --all-features --workspace

  cargo-docs-rs:
    desc: "Check that the doc build on docs.rs"
    cmd: cargo +nightly docs-rs --locked -p '{{ .MAIN_CRATE }}'

  cargo-features:
    desc: "Run the test for each features"
    cmd: cargo hack --each-feature test --locked -p  '{{ .MAIN_CRATE }}'

  cargo-test:
    desc: "Run all the unit test"
    cmds:
      - cargo nextest run --locked --all-features --workspace
      - cargo test --locked --all-features --doc --workspace

  cargo-msrv:
    desc: "Run check with the msrv {{ .MSRV }}"
    cmds:
      - cargo '+{{ .MSRV }}' hack --no-dev-deps check --all-features -p '{{ .MAIN_CRATE }}'

  cargo-minimal-versions:
    desc: "Check if the minimal versiosn are correct"
    if: "{{ .LIBRARY }}"
    cmd: cargo minimal-versions check --workspace --ignore-private --detach-path-deps=skip-exact --direct

  cargo-semver-checks:
    desc: "Check if the minimal versiosn are correct"
    if: "{{ .LIBRARY }}"
    cmd: cargo semver-checks check-release

  coverage:
    desc: "Generate the test coverage"
    cmd: ./scripts/ci/coverage.sh

  e2e-test:
    desc: "Run the e2e-test with Astarte"
    cmd: ./scripts/ci/e2e-test.sh
